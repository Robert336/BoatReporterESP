<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Notifications · BilgeRise</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="prefetch" href="/settings">
<style>
*{box-sizing:border-box}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif;background:#f7f5f1;color:#1c1917;font-size:16px;line-height:1.4;-webkit-font-smoothing:antialiased}
.app{max-width:480px;margin:0 auto;padding:16px}
header{display:flex;align-items:center;gap:8px;padding:8px 0 14px}
.back{color:#44403c;text-decoration:none;display:inline-flex;align-items:center;justify-content:center;width:40px;height:40px;border-radius:50%;background:#fff;border:1px solid #e7e5e4;font-size:18px;line-height:1}
.back:active{background:#f5f5f4}
h1{font-size:20px;font-weight:600;margin:0;letter-spacing:-0.01em}
h2{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:#78716c;margin:0 0 10px}
.card{background:#fff;border:1px solid #e7e5e4;border-radius:14px;padding:18px;margin-bottom:14px;scroll-margin-top:16px}
.head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;gap:8px}
.head h2{margin:0}
.pill{display:inline-flex;align-items:center;gap:6px;padding:4px 10px;border-radius:999px;background:#f5f5f4;border:1px solid #e7e5e4;font-size:12px;color:#44403c}
.dot{width:7px;height:7px;border-radius:50%;background:#a8a29e;flex-shrink:0;display:inline-block}
.dot.ok{background:#65a30d}
.dot.warn{background:#ea580c}
.dot.bad{background:#dc2626}
label{display:block;font-size:13px;color:#78716c;margin:10px 0 6px}
label .hint{font-weight:normal;color:#a8a29e;margin-left:4px}
.input{display:flex;align-items:stretch;background:#f5f5f4;border:1px solid #e7e5e4;border-radius:10px;overflow:hidden;transition:border-color .15s}
.input:focus-within{border-color:#1c1917;background:#fff}
.input input,.input textarea{flex:1;border:0;background:transparent;padding:10px 12px;font-size:15px;font-family:inherit;color:inherit;width:100%;min-width:0;resize:none}
.input input:focus,.input textarea:focus{outline:0}
.input .sfx{align-self:center;padding-right:12px;font-size:13px;color:#78716c}
.actions{display:flex;gap:8px;margin-top:14px}
.btn{flex:1;padding:12px;background:#1c1917;color:#fff;border:0;border-radius:10px;font-size:14px;font-weight:600;font-family:inherit;cursor:pointer;transition:background .15s}
.btn:active{background:#292524}
.btn.secondary{background:#fff;color:#1c1917;border:1px solid #e7e5e4}
.btn.secondary:active{background:#f5f5f4}
.btn:disabled{opacity:.5;cursor:not-allowed}
.msg{margin-top:10px;font-size:13px;text-align:center;color:#78716c;min-height:18px}
.msg.ok{color:#65a30d}
.msg.bad{color:#dc2626}
.helptext{font-size:12px;color:#a8a29e;margin-top:6px}
</style>
</head>
<body>
<div class="app">
<header>
<a href="/settings" class="back" aria-label="Back">‹</a>
<h1>Notifications</h1>
</header>

<div class="card" id="sms">
<div class="head"><h2>SMS · Twilio</h2><span class="pill" id="sms_pill"><span class="dot" id="sms_dot"></span><span id="sms_label">…</span></span></div>
<label>Phone number</label>
<div class="input"><input type="tel" id="phone" placeholder="+1234567890"></div>
<div class="helptext">Include country code (e.g. +1 for US/CA)</div>
<div class="actions">
<button class="btn" onclick="savePhone()">Save</button>
<button class="btn secondary" id="test_sms" onclick="testSMS()">Test</button>
</div>
<div class="msg" id="sms_msg"></div>
</div>

<div class="card" id="discord">
<div class="head"><h2>Discord</h2><span class="pill" id="disc_pill"><span class="dot" id="disc_dot"></span><span id="disc_label">…</span></span></div>
<label>Webhook URL</label>
<div class="input"><input type="url" id="webhook" placeholder="https://discord.com/api/webhooks/…"></div>
<div class="helptext">Server Settings → Integrations → Webhooks</div>
<div class="actions">
<button class="btn" onclick="saveWebhook()">Save</button>
<button class="btn secondary" id="test_disc" onclick="testDisc()">Test</button>
</div>
<div class="msg" id="disc_msg"></div>
</div>

<div class="card" id="mqtt">
<div class="head"><h2>MQTT broker</h2><span class="pill" id="mqtt_pill"><span class="dot" id="mqtt_dot"></span><span id="mqtt_label">…</span></span></div>
<label>Broker host</label>
<div class="input"><input type="text" id="mqtt_host" placeholder="192.168.2.41"></div>
<label>Port</label>
<div class="input"><input type="number" id="mqtt_port" placeholder="1883" min="1" max="65535"></div>
<label>Username <span class="hint">optional</span></label>
<div class="input"><input type="text" id="mqtt_user" placeholder="anonymous"></div>
<label>Password <span class="hint">optional · write-only</span></label>
<div class="input"><input type="password" id="mqtt_pass" placeholder="anonymous"></div>
<label>Base topic <span class="hint">optional</span></label>
<div class="input"><input type="text" id="mqtt_topic" placeholder="boat/aabbcc"></div>
<div class="helptext">Logs publish to &lt;topic&gt;/log · availability at &lt;topic&gt;/availability</div>
<div class="actions">
<button class="btn" onclick="saveMqtt()">Save</button>
<button class="btn secondary" id="test_mqtt" onclick="testMqtt()">Test</button>
</div>
<div class="msg" id="mqtt_msg"></div>
</div>

</div>

<script>
function el(id){return document.getElementById(id)}
function flash(id,t,cls){var m=el(id);m.textContent=t;m.className='msg '+(cls||'');if(cls==='ok')setTimeout(function(){m.textContent='';m.className='msg'},2500)}
function setPill(dot,lbl,state,text){el(dot).className='dot '+state;el(lbl).textContent=text}

function loadNotif(){
fetch('/notifications').then(r=>r.json()).then(d=>{
el('phone').value=d.phoneNumber||'';
setPill('sms_dot','sms_label',d.hasPhoneNumber?'ok':'',d.hasPhoneNumber?'configured':'off');
el('webhook').value=d.discordWebhook||'';
setPill('disc_dot','disc_label',d.hasDiscordWebhook?'ok':'',d.hasDiscordWebhook?'configured':'off');
el('mqtt_host').value=d.mqttHost||'';
el('mqtt_port').value=d.mqttPort||1883;
el('mqtt_user').value=d.mqttUser||'';
el('mqtt_topic').value=d.mqttBaseTopic||'';
if(d.mqttConfigured&&d.mqttConnected)setPill('mqtt_dot','mqtt_label','ok','connected');
else if(d.mqttConfigured)setPill('mqtt_dot','mqtt_label','warn','disconnected');
else setPill('mqtt_dot','mqtt_label','','off');
}).catch(e=>{})
}
// Refresh only the MQTT connection pill; never touch input fields so it
// can't clobber what the user is mid-typing.
function pollMqttStatus(){
fetch('/notifications').then(r=>r.json()).then(d=>{
if(d.mqttConfigured&&d.mqttConnected)setPill('mqtt_dot','mqtt_label','ok','connected');
else if(d.mqttConfigured)setPill('mqtt_dot','mqtt_label','warn','disconnected');
else setPill('mqtt_dot','mqtt_label','','off');
}).catch(e=>{})
}
function post(url,body,msgId,okText){
return fetch(url,{method:'POST',headers:{'Content-Type':'application/x-www-form-urlencoded'},body:body}).then(r=>r.json()).then(d=>{
if(d.success){flash(msgId,okText||'✓ Saved','ok');return true}
flash(msgId,'✗ '+(d.error||'failed'),'bad');return false
}).catch(e=>{flash(msgId,'Error: '+e.message,'bad');return false})
}
function savePhone(){var v=el('phone').value;if(!v){flash('sms_msg','Enter phone number','bad');return}post('/notifications/phone','phone='+encodeURIComponent(v),'sms_msg').then(ok=>{if(ok)loadNotif()})}
function saveWebhook(){var v=el('webhook').value;if(!v){flash('disc_msg','Enter webhook URL','bad');return}post('/notifications/discord','webhook='+encodeURIComponent(v),'disc_msg').then(ok=>{if(ok)loadNotif()})}
function saveMqtt(){
var h=el('mqtt_host').value;if(!h){flash('mqtt_msg','Enter broker host','bad');return}
var body='host='+encodeURIComponent(h)
+'&port='+encodeURIComponent(el('mqtt_port').value||'1883')
+'&user='+encodeURIComponent(el('mqtt_user').value)
+'&pass='+encodeURIComponent(el('mqtt_pass').value)
+'&topic='+encodeURIComponent(el('mqtt_topic').value);
post('/notifications/mqtt',body,'mqtt_msg').then(ok=>{if(ok){el('mqtt_pass').value='';loadNotif()}})
}
function testChan(url,btnId,msgId){
var btn=el(btnId);btn.disabled=true;var old=btn.textContent;btn.textContent='…';
flash(msgId,'Sending…','');
fetch(url,{method:'POST'}).then(r=>r.json()).then(d=>{
btn.disabled=false;btn.textContent=old;
flash(msgId,d.success?'✓ '+(d.message||'sent'):'✗ '+(d.error||'failed'),d.success?'ok':'bad');
}).catch(e=>{btn.disabled=false;btn.textContent=old;flash(msgId,'Error: '+e.message,'bad')})
}
function testSMS(){testChan('/notifications/test/sms','test_sms','sms_msg')}
function testDisc(){testChan('/notifications/test/discord','test_disc','disc_msg')}
function testMqtt(){testChan('/notifications/test/mqtt','test_mqtt','mqtt_msg')}

loadNotif();
setInterval(pollMqttStatus,5000);
if(location.hash){setTimeout(function(){var t=document.querySelector(location.hash);if(t)t.scrollIntoView({behavior:'smooth',block:'start'})},100)}
</script>
</body>
</html>
