# Telegraf: MQTT -> InfluxDB bridge for BoatReporterESP.

[agent]
  interval = "10s"
  flush_interval = "10s"
  omit_hostname = true

# ── Telemetry (structured JSON) ─────────────────────────────────────────────
# boat/<mac>/telemetry -> measurement "boat_telemetry"
# Fields: level_cm, rate_cm_30min (float); state (string); sensor_error,
# valid (bool); rssi (int). The <mac> segment becomes the "device" tag.
[[inputs.mqtt_consumer]]
  name_override = "boat_telemetry"
  # Telegraf talks to the broker over the internal Docker network in plaintext;
  # only external devices use the TLS 8883 port.
  servers = ["tcp://mosquitto:1883"]
  topics  = ["boat/+/telemetry"]
  qos = 0
  # Empty when the broker is anonymous (LAN); populated from .env for WAN auth.
  username = "${MQTT_USERNAME}"
  password = "${MQTT_PASSWORD}"
  data_format = "json_v2"

  [[inputs.mqtt_consumer.topic_parsing]]
    topic = "boat/+/telemetry"
    tags  = "_/device/_"

  [[inputs.mqtt_consumer.json_v2]]
    [[inputs.mqtt_consumer.json_v2.object]]
      path = "@this"

# ── Availability (LWT, plain string) ────────────────────────────────────────
# boat/<mac>/availability -> measurement "boat_availability", field "value"
# ("online" / "offline").
[[inputs.mqtt_consumer]]
  name_override = "boat_availability"
  servers = ["tcp://mosquitto:1883"]
  topics  = ["boat/+/availability"]
  qos = 0
  username = "${MQTT_USERNAME}"
  password = "${MQTT_PASSWORD}"
  data_format = "value"
  data_type   = "string"

  [[inputs.mqtt_consumer.topic_parsing]]
    topic = "boat/+/availability"
    tags  = "_/device/_"

# ── Output ──────────────────────────────────────────────────────────────────
[[outputs.influxdb_v2]]
  urls         = ["http://influxdb:8086"]
  token        = "${INFLUX_TOKEN}"
  organization = "${INFLUX_ORG}"
  bucket       = "${INFLUX_BUCKET}"
