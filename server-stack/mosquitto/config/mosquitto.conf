# Mosquitto broker config for the BoatReporter stack (LAN / development).
#
# This is the open, anonymous LAN config — fine for local testing and for the
# initial Grafana bring-up. To expose the broker over the internet, switch to
# the hardened TLS + auth config: see mosquitto.conf.wan and the "WAN / TLS
# deployment" section of ../../README.md.

listener 1883

# Anonymous access — matches the device's default (anonymous) MQTT connection
# and is fine on a trusted home LAN. To require credentials instead:
#   1. allow_anonymous false
#   2. password_file /mosquitto/config/passwd
#   3. create the file:  docker exec -it boat-mosquitto mosquitto_passwd -c /mosquitto/config/passwd <user>
#   4. set the same user/pass in the device UI AND in telegraf/telegraf.conf
allow_anonymous true

# Persist retained messages / subscriptions across restarts.
persistence true
persistence_location /mosquitto/data/

# Log to stdout so `docker compose logs mosquitto` works.
log_dest stdout
